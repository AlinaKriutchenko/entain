syntax = "proto3";
package racing;

option go_package = "/racing";

import "google/protobuf/timestamp.proto";

service Racing {
  // ListRaces will return a collection of all races.
  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse) {}
}

/* Requests/Responses */

message ListRacesRequest {
  ListRacesRequestFilter filter = 1;
  // order_by field to sort by (advertised_start_time, id, name, number). Defaults to advertised_start_time ASC.
  string order_by = 2;
}

// Response to ListRaces call.
message ListRacesResponse {
  repeated Race races = 1;
}

// Filter for listing races.
message ListRacesRequestFilter {
  repeated int64 meeting_ids = 1;
  // When set to true, only races that are visible will be returned.
  // When false or omitted, all races are returned regardless of visibility.
  optional bool only_visible = 2;
}

/* Resources */

// RaceStatus is OPEN if the race hasn't started yet, CLOSED if it's in the past.
enum RaceStatus {
  RACE_STATUS_UNSPECIFIED = 0;
  RACE_STATUS_OPEN = 1;
  RACE_STATUS_CLOSED = 2;
}

// A race resource.
message Race {
  // ID represents a unique identifier for the race.
  int64 id = 1;
  // MeetingID represents a unique identifier for the races meeting.
  int64 meeting_id = 2;
  // Name is the official name given to the race.
  string name = 3;
  // Number represents the number of the race.
  int64 number = 4;
  // Visible represents whether or not the race is visible.
  bool visible = 5;
  // AdvertisedStartTime is the time the race is advertised to run.
  google.protobuf.Timestamp advertised_start_time = 6;
  // Status is derived from advertised_start_time: OPEN if in the future, CLOSED if in the past.
  RaceStatus status = 7;
}

